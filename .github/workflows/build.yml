name: Build Roblox Unit Visualizer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --onefile --windowed --name "RobloxUnitVisualizer" main.py
        # Use plutil to set LSUIElement to 1 (hides Dock icon)
        # We target the built .app bundle
        plutil -replace LSUIElement -string 1 dist/RobloxUnitVisualizer.app/Contents/Info.plist

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name "RobloxUnitVisualizer" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RobloxUnitVisualizer-${{ matrix.os }}
        path: |
          dist/*.exe
          dist/*.app
          dist/RobloxUnitVisualizer
